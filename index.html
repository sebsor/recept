<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Recipes</title>
<style>
  /* ===== Design tokens ===== */
  :root {
    --bg: #E4E9DA;           /* soft sage/putty background — not cream */
    --surface: #F4F2E8;      /* card surface, slightly lighter/warmer than bg */
    --surface-raised: #FFFFFF;
    --ink: #2B2620;          /* near-black warm charcoal, body text */
    --ink-soft: #5C5646;     /* secondary text */
    --cocoa: #5C3A21;        /* headers, primary accent — deep brown, not terracotta */
    --mustard: #C89B3C;      /* tag/highlight accent */
    --mustard-soft: #EDE0BE; /* tag background */
    --line: #C9CBB8;         /* hairline borders */
    --danger: #8B3A2E;

    --font-display: 'Fraunces', Georgia, serif;
    --font-body: 'Public Sans', -apple-system, BlinkMacSystemFont, sans-serif;
    --font-mono: 'IBM Plex Mono', 'Courier New', monospace;

    --radius: 10px;
    --radius-sm: 6px;
  }

  @font-face {
    font-family: 'Fraunces';
    src: local('Georgia');
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: var(--font-body);
    line-height: 1.5;
    min-height: 100vh;
  }

  a { color: inherit; }

  .app {
    max-width: 720px;
    margin: 0 auto;
    padding: 24px 20px 80px;
  }

  /* ===== Header ===== */
  .app-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 20px;
  }

  .app-header h1 {
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 28px;
    color: var(--cocoa);
    margin: 0;
    letter-spacing: -0.01em;
  }

  .btn {
    font-family: var(--font-body);
    font-size: 14px;
    font-weight: 600;
    border: none;
    border-radius: var(--radius-sm);
    padding: 10px 16px;
    cursor: pointer;
    transition: transform 0.08s ease, background 0.15s ease;
  }
  .btn:active { transform: scale(0.97); }
  .btn:focus-visible { outline: 2px solid var(--cocoa); outline-offset: 2px; }

  .btn-primary { background: var(--cocoa); color: var(--surface); }
  .btn-primary:hover { background: #4a2f1a; }

  .btn-secondary { background: var(--surface-raised); color: var(--ink); border: 1px solid var(--line); }
  .btn-secondary:hover { background: var(--mustard-soft); }

  .btn-danger { background: transparent; color: var(--danger); border: 1px solid var(--danger); }
  .btn-danger:hover { background: rgba(139,58,46,0.08); }

  .btn-icon {
    background: transparent;
    border: none;
    cursor: pointer;
    font-size: 20px;
    padding: 4px 8px;
    color: var(--ink-soft);
  }
  .btn-icon:focus-visible { outline: 2px solid var(--cocoa); outline-offset: 2px; }

  /* ===== Filter bar ===== */
  .filter-bar {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }

  .search-input, select, input[type=text], input[type=number], textarea {
    font-family: var(--font-body);
    font-size: 14px;
    padding: 10px 12px;
    border: 1px solid var(--line);
    border-radius: var(--radius-sm);
    background: var(--surface-raised);
    color: var(--ink);
  }
  .search-input:focus-visible, select:focus-visible, input:focus-visible, textarea:focus-visible {
    outline: 2px solid var(--cocoa);
    outline-offset: 1px;
  }

  .search-input { flex: 1; min-width: 160px; }

  /* ===== Recipe card (index-tab signature) ===== */
  .recipe-grid {
    display: grid;
    gap: 18px;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  }

  .recipe-card {
    position: relative;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 20px 16px 16px;
    cursor: pointer;
    transition: transform 0.12s ease, box-shadow 0.12s ease;
    text-decoration: none;
    display: block;
    color: var(--ink);
  }
  .recipe-card:hover, .recipe-card:focus-visible {
    transform: translateY(-2px);
    box-shadow: 0 6px 16px rgba(43,38,32,0.12);
    outline: none;
  }
  .recipe-card:focus-visible { outline: 2px solid var(--cocoa); outline-offset: 2px; }

  /* the "index tab" — die-cut label sticking up from the card top edge */
  .recipe-tab {
    position: absolute;
    top: -11px;
    left: 16px;
    background: var(--mustard);
    color: var(--cocoa);
    font-family: var(--font-mono);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 4px 4px 0 0;
    clip-path: polygon(6% 0, 94% 0, 100% 100%, 0% 100%);
  }

  .recipe-card h3 {
    font-family: var(--font-display);
    font-size: 19px;
    font-weight: 600;
    margin: 6px 0 8px;
    color: var(--cocoa);
  }

  .recipe-card .meta {
    font-size: 13px;
    color: var(--ink-soft);
    font-family: var(--font-mono);
  }

  .recipe-card .photo-thumb {
    width: 100%;
    height: 120px;
    object-fit: cover;
    border-radius: var(--radius-sm);
    margin-bottom: 10px;
    background: var(--mustard-soft);
  }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--ink-soft);
  }
  .empty-state .stamp {
    font-family: var(--font-display);
    font-size: 20px;
    color: var(--cocoa);
    margin-bottom: 8px;
  }

  /* ===== Detail view ===== */
  .back-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 14px;
    font-weight: 600;
    color: var(--ink-soft);
    text-decoration: none;
    margin-bottom: 16px;
    background: none;
    border: none;
    cursor: pointer;
    padding: 4px 0;
  }
  .back-link:hover { color: var(--cocoa); }
  .back-link:focus-visible { outline: 2px solid var(--cocoa); outline-offset: 2px; }

  .detail-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
    margin-bottom: 4px;
  }

  .detail-header h2 {
    font-family: var(--font-display);
    font-size: 30px;
    color: var(--cocoa);
    margin: 0;
  }

  .detail-actions { display: flex; gap: 8px; flex-shrink: 0; }

  .tag-pill {
    display: inline-block;
    background: var(--mustard-soft);
    color: var(--cocoa);
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 999px;
    margin: 8px 0 16px;
  }

  .detail-photo {
    width: 100%;
    max-height: 320px;
    object-fit: cover;
    border-radius: var(--radius);
    margin-bottom: 20px;
    background: var(--mustard-soft);
  }

  .detail-servings {
    font-family: var(--font-mono);
    font-size: 14px;
    color: var(--ink-soft);
    margin-bottom: 20px;
  }

  .section-label {
    font-family: var(--font-display);
    font-size: 16px;
    font-weight: 600;
    color: var(--cocoa);
    margin: 24px 0 10px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--line);
  }

  .ingredient-list { list-style: none; padding: 0; margin: 0; }
  .ingredient-list li {
    display: flex;
    gap: 10px;
    padding: 8px 0;
    border-bottom: 1px dashed var(--line);
    font-size: 15px;
  }
  .ingredient-list .amt {
    font-family: var(--font-mono);
    color: var(--cocoa);
    font-weight: 600;
    min-width: 90px;
    flex-shrink: 0;
  }

  .instructions { white-space: pre-wrap; font-size: 15px; }

  /* ===== Form (add/edit) ===== */
  .form-field { margin-bottom: 16px; display: flex; flex-direction: column; gap: 6px; }
  .form-field label { font-size: 13px; font-weight: 600; color: var(--ink-soft); }
  .form-row { display: flex; gap: 12px; }
  .form-row .form-field { flex: 1; }

  .cuisine-row { display: flex; gap: 8px; align-items: center; }
  .cuisine-row select { flex: 1; }

  .ingredient-row {
    display: grid;
    grid-template-columns: 1fr 90px 90px 32px;
    gap: 8px;
    margin-bottom: 8px;
    align-items: center;
  }

  .add-ingredient-btn {
    background: none;
    border: 1px dashed var(--line);
    border-radius: var(--radius-sm);
    padding: 8px;
    width: 100%;
    color: var(--ink-soft);
    font-size: 13px;
    cursor: pointer;
    margin-top: 4px;
  }
  .add-ingredient-btn:hover { border-color: var(--cocoa); color: var(--cocoa); }

  textarea { width: 100%; min-height: 140px; font-family: var(--font-body); resize: vertical; }

  .photo-upload {
    border: 1px dashed var(--line);
    border-radius: var(--radius);
    padding: 16px;
    text-align: center;
    cursor: pointer;
  }
  .photo-upload img { max-width: 100%; max-height: 200px; border-radius: var(--radius-sm); }
  .photo-upload input[type=file] { display: none; }

  .form-actions {
    display: flex;
    gap: 10px;
    margin-top: 28px;
    padding-top: 20px;
    border-top: 1px solid var(--line);
  }

  @media (max-width: 480px) {
    .detail-header h2 { font-size: 24px; }
    .ingredient-row { grid-template-columns: 1fr 70px 70px 28px; }
  }

  [hidden] { display: none !important; }
</style>
</head>
<body>

<div class="app">
  <div id="view-list"></div>
  <div id="view-detail" hidden></div>
  <div id="view-edit" hidden></div>
</div>

<script>
/* =========================================================================
   REPOSITORY LAYER
   This is the ONLY code that touches storage. Every view below calls
   RecipeRepository.* — never localStorage directly. When we move to
   Supabase, only the internals of this object change (localStorage.getItem
   becomes an await supabase.from('recipes').select(), etc). The three
   views never need to change, because they only know about this interface.
   ========================================================================= */
const RecipeRepository = (() => {
  const STORAGE_KEY = 'recipes:data';
  const CUISINES_KEY = 'recipes:cuisines';
  const DEFAULT_CUISINES = ['Italian', 'Thai', 'Mexican', 'Indian', 'Swedish', 'Japanese', 'Vegetarian'];

  function readAll() {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : [];
  }
  function writeAll(recipes) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(recipes));
  }

  return {
    getAll() {
      return readAll().sort((a, b) => b.createdAt - a.createdAt);
    },
    get(id) {
      return readAll().find(r => r.id === id) || null;
    },
    save(recipe) {
      const all = readAll();
      if (recipe.id) {
        const idx = all.findIndex(r => r.id === recipe.id);
        if (idx >= 0) { all[idx] = recipe; writeAll(all); return recipe; }
      }
      recipe.id = crypto.randomUUID();
      recipe.createdAt = Date.now();
      all.push(recipe);
      writeAll(all);
      return recipe;
    },
    delete(id) {
      writeAll(readAll().filter(r => r.id !== id));
    },
    getCuisines() {
      const raw = localStorage.getItem(CUISINES_KEY);
      return raw ? JSON.parse(raw) : DEFAULT_CUISINES;
    },
    addCuisine(name) {
      const list = this.getCuisines();
      if (!list.includes(name)) {
        list.push(name);
        localStorage.setItem(CUISINES_KEY, JSON.stringify(list));
      }
      return list;
    }
  };
})();

/* =========================================================================
   ROUTER
   Hash-based so GitHub Pages (static hosting, no server routes) never sees
   a request for /recipe/xyz — the browser only ever asks for index.html,
   and everything after # is handled here in JS. Refresh always works.
   ========================================================================= */
function navigateTo(path) {
  window.location.hash = path;
}

function parseHash() {
  const hash = window.location.hash.slice(1) || '/list';
  const parts = hash.split('/').filter(Boolean);
  if (parts[0] === 'recipe' && parts[1]) return { view: 'detail', id: parts[1] };
  if (parts[0] === 'edit') return { view: 'edit', id: parts[1] || null };
  return { view: 'list' };
}

function render() {
  const route = parseHash();
  document.getElementById('view-list').hidden = route.view !== 'list';
  document.getElementById('view-detail').hidden = route.view !== 'detail';
  document.getElementById('view-edit').hidden = route.view !== 'edit';

  if (route.view === 'list') renderListView();
  if (route.view === 'detail') renderDetailView(route.id);
  if (route.view === 'edit') renderEditView(route.id);
}

window.addEventListener('hashchange', render);
window.addEventListener('DOMContentLoaded', render);

/* =========================================================================
   LIST VIEW
   ========================================================================= */
let listState = { search: '', cuisine: '' };

function renderListView() {
  const container = document.getElementById('view-list');
  const recipes = RecipeRepository.getAll();
  const cuisines = RecipeRepository.getCuisines();

  const filtered = recipes.filter(r => {
    const matchesSearch = !listState.search ||
      r.title.toLowerCase().includes(listState.search.toLowerCase()) ||
      r.ingredients.some(i => i.name.toLowerCase().includes(listState.search.toLowerCase()));
    const matchesCuisine = !listState.cuisine || r.cuisine === listState.cuisine;
    return matchesSearch && matchesCuisine;
  });

  container.innerHTML = `
    <div class="app-header">
      <h1>Our Recipes</h1>
      <button class="btn btn-primary" onclick="navigateTo('/edit')">+ Add recipe</button>
    </div>
    <div class="filter-bar">
      <input class="search-input" type="text" placeholder="Search title or ingredient..."
        value="${escapeHtml(listState.search)}" id="search-input">
      <select id="cuisine-filter">
        <option value="">All cuisines</option>
        ${cuisines.map(c => `<option value="${c}" ${listState.cuisine === c ? 'selected' : ''}>${c}</option>`).join('')}
      </select>
    </div>
    ${filtered.length === 0 ? renderEmptyState(recipes.length === 0) : `
      <div class="recipe-grid">
        ${filtered.map(renderRecipeCard).join('')}
      </div>
    `}
  `;

  document.getElementById('search-input').addEventListener('input', e => {
    listState.search = e.target.value;
    renderListView();
  });
  document.getElementById('cuisine-filter').addEventListener('change', e => {
    listState.cuisine = e.target.value;
    renderListView();
  });
}

function renderEmptyState(noneAtAll) {
  return `
    <div class="empty-state">
      <div class="stamp">${noneAtAll ? 'The box is empty' : 'Nothing matches'}</div>
      <p>${noneAtAll ? 'Add the first recipe worth keeping.' : 'Try a different search or cuisine.'}</p>
    </div>
  `;
}

function renderRecipeCard(r) {
  return `
    <a class="recipe-card" href="#/recipe/${r.id}">
      <span class="recipe-tab">${escapeHtml(r.cuisine || 'Uncategorized')}</span>
      ${r.photo ? `<img class="photo-thumb" src="${r.photo}" alt="">` : ''}
      <h3>${escapeHtml(r.title)}</h3>
      <div class="meta">serves ${r.servings || '—'}</div>
    </a>
  `;
}

/* =========================================================================
   DETAIL VIEW
   ========================================================================= */
function renderDetailView(id) {
  const container = document.getElementById('view-detail');
  const r = RecipeRepository.get(id);

  if (!r) {
    container.innerHTML = `<button class="back-link" onclick="navigateTo('/list')">&larr; Back</button><p>Recipe not found.</p>`;
    return;
  }

  container.innerHTML = `
    <button class="back-link" onclick="navigateTo('/list')">&larr; Back to recipes</button>
    <div class="detail-header">
      <h2>${escapeHtml(r.title)}</h2>
      <div class="detail-actions">
        <button class="btn btn-secondary" onclick="navigateTo('/edit/${r.id}')">Edit</button>
        <button class="btn btn-danger" onclick="handleDelete('${r.id}')">Delete</button>
      </div>
    </div>
    <span class="tag-pill">${escapeHtml(r.cuisine || 'Uncategorized')}</span>
    ${r.photo ? `<img class="detail-photo" src="${r.photo}" alt="${escapeHtml(r.title)}">` : ''}
    <div class="detail-servings">serves ${r.servings || '—'}</div>

    <div class="section-label">Ingredients</div>
    <ul class="ingredient-list">
      ${r.ingredients.map(i => `
        <li><span class="amt">${i.amount || ''} ${i.unit || ''}</span><span>${escapeHtml(i.name)}</span></li>
      `).join('')}
    </ul>

    <div class="section-label">Instructions</div>
    <div class="instructions">${escapeHtml(r.instructions)}</div>
  `;
}

function handleDelete(id) {
  if (confirm("Delete this recipe? This can't be undone.")) {
    RecipeRepository.delete(id);
    navigateTo('/list');
  }
}

/* =========================================================================
   EDIT / ADD VIEW
   ========================================================================= */
let editState = { ingredients: [], photo: null };

function renderEditView(id) {
  const container = document.getElementById('view-edit');
  const existing = id ? RecipeRepository.get(id) : null;
  const cuisines = RecipeRepository.getCuisines();

  editState = existing
    ? { ...existing, ingredients: existing.ingredients.map(i => ({ ...i })) }
    : { title: '', cuisine: '', servings: '', ingredients: [{ name: '', amount: '', unit: '' }], instructions: '', photo: null };

  container.innerHTML = `
    <button class="back-link" onclick="navigateTo('${existing ? '#/recipe/' + existing.id : '/list'}')">&larr; Cancel</button>
    <div class="app-header"><h1>${existing ? 'Edit recipe' : 'Add recipe'}</h1></div>

    <div class="form-field">
      <label for="f-title">Title</label>
      <input type="text" id="f-title" value="${escapeHtml(editState.title)}" placeholder="Green curry">
    </div>

    <div class="form-row">
      <div class="form-field">
        <label for="f-cuisine">Cuisine</label>
        <div class="cuisine-row">
          <select id="f-cuisine">
            <option value="">Select...</option>
            ${cuisines.map(c => `<option value="${c}" ${editState.cuisine === c ? 'selected' : ''}>${c}</option>`).join('')}
          </select>
          <button type="button" class="btn btn-secondary" onclick="handleAddCuisine()">+ New</button>
        </div>
      </div>
      <div class="form-field">
        <label for="f-servings">Servings</label>
        <input type="number" id="f-servings" min="1" value="${escapeHtml(String(editState.servings || ''))}" placeholder="4">
      </div>
    </div>

    <div class="form-field">
      <label>Photo</label>
      <div class="photo-upload" onclick="document.getElementById('f-photo').click()">
        ${editState.photo ? `<img src="${editState.photo}" alt="">` : '<span>Click to upload a photo</span>'}
        <input type="file" id="f-photo" accept="image/*">
      </div>
    </div>

    <div class="form-field">
      <label>Ingredients</label>
      <div id="ingredient-rows"></div>
      <button type="button" class="add-ingredient-btn" onclick="handleAddIngredientRow()">+ Add ingredient</button>
    </div>

    <div class="form-field">
      <label for="f-instructions">Instructions</label>
      <textarea id="f-instructions" placeholder="1. Heat the oil...">${escapeHtml(editState.instructions)}</textarea>
    </div>

    <div class="form-actions">
      <button class="btn btn-primary" onclick="handleSave('${existing ? existing.id : ''}')">Save recipe</button>
      <button class="btn btn-secondary" onclick="navigateTo('${existing ? '#/recipe/' + existing.id : '/list'}')">Cancel</button>
    </div>
  `;

  renderIngredientRows();

  document.getElementById('f-photo').addEventListener('change', handlePhotoUpload);
}

function renderIngredientRows() {
  const el = document.getElementById('ingredient-rows');
  el.innerHTML = editState.ingredients.map((ing, idx) => `
    <div class="ingredient-row">
      <input type="text" placeholder="Ingredient" value="${escapeHtml(ing.name)}"
        oninput="editState.ingredients[${idx}].name = this.value">
      <input type="text" placeholder="Amount" value="${escapeHtml(String(ing.amount || ''))}"
        oninput="editState.ingredients[${idx}].amount = this.value">
      <input type="text" placeholder="Unit" value="${escapeHtml(ing.unit || '')}"
        oninput="editState.ingredients[${idx}].unit = this.value">
      <button type="button" class="btn-icon" onclick="handleRemoveIngredientRow(${idx})" aria-label="Remove ingredient">&times;</button>
    </div>
  `).join('');
}

function handleAddIngredientRow() {
  editState.ingredients.push({ name: '', amount: '', unit: '' });
  renderIngredientRows();
}
function handleRemoveIngredientRow(idx) {
  editState.ingredients.splice(idx, 1);
  renderIngredientRows();
}

function handleAddCuisine() {
  const name = prompt('New cuisine/category name:');
  if (name && name.trim()) {
    RecipeRepository.addCuisine(name.trim());
    renderEditView(editState.id || null);
    document.getElementById('f-cuisine').value = name.trim();
  }
}

function handlePhotoUpload(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    editState.photo = reader.result;
    renderEditView(editState.id || null);
  };
  reader.readAsDataURL(file);
}

function handleSave(existingId) {
  const title = document.getElementById('f-title').value.trim();
  if (!title) { alert('Give the recipe a title.'); return; }

  const recipe = {
    id: existingId || null,
    title,
    cuisine: document.getElementById('f-cuisine').value,
    servings: document.getElementById('f-servings').value,
    ingredients: editState.ingredients.filter(i => i.name.trim()),
    instructions: document.getElementById('f-instructions').value,
    photo: editState.photo,
    createdAt: editState.createdAt || null
  };

  const saved = RecipeRepository.save(recipe);
  navigateTo('/recipe/' + saved.id);
}

/* ===== utility ===== */
function escapeHtml(str) {
  if (str === null || str === undefined) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}
</script>

</body>
</html>
