<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Menu</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#A8481F">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Public+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  /* =========================================================================
     DESIGN TOKENS — "leather menu cover holding cream pages" concept.
     --clay is the dominant chrome color (page background, header, primary
     buttons) — the "cover." --bone is the surface every actual recipe lives
     on (cards, the detail panel, the form) — the "pages." Content you need
     to read closely while cooking always sits on --bone for contrast;
     --clay is reserved for navigation chrome and hero moments.
     ========================================================================= */
  :root {
    --clay: #A8481F;
    --clay-hover: #8C3B18;
    --espresso: #241812;
    --bone: #F3EAD9;
    --bone-raised: #FFFDF8;
    --cream-text: #F7EEDD;
    --muted-on-bone: #7A6A57;
    --muted-on-clay: rgba(247, 238, 221, 0.72);
    --gold: #C9A227;
    --gold-soft: #E9DBA9;
    --rust: #B8552F;
    --line-on-bone: rgba(36, 24, 18, 0.14);
    --danger: #A23B2E;

    --font-display: 'Fraunces', Georgia, serif;
    --font-body: 'Public Sans', -apple-system, BlinkMacSystemFont, sans-serif;
    --font-mono: 'IBM Plex Mono', 'Courier New', monospace;

    --radius: 16px;
    --radius-sm: 8px;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--clay);
    color: var(--cream-text);
    font-family: var(--font-body);
    line-height: 1.55;
    min-height: 100vh;
  }

  a { color: inherit; }

  .app {
    max-width: 720px;
    margin: 0 auto;
    padding: 28px 20px 90px;
  }

  .app-logo-wrap { text-align: center; margin-bottom: 10px; }
  .app-logo-wrap img {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    border: 3px solid var(--gold);
  }

  .app-header { text-align: center; margin-bottom: 28px; }
  .app-header h1 {
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 40px;
    color: var(--cream-text);
    margin: 4px 0 6px;
    letter-spacing: -0.01em;
  }
  .app-tagline {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--gold-soft);
    margin: 0 0 20px;
  }

  .btn {
    font-family: var(--font-body);
    font-size: 14px;
    font-weight: 600;
    border: none;
    border-radius: var(--radius-sm);
    padding: 11px 20px;
    cursor: pointer;
    white-space: nowrap;
    transition: transform 0.08s ease, background 0.15s ease, box-shadow 0.15s ease;
  }
  .btn:active { transform: scale(0.97); }
  .btn:focus-visible { outline: 2px solid var(--gold); outline-offset: 2px; }

  .btn-primary { background: var(--gold); color: var(--espresso); box-shadow: 0 2px 10px rgba(36,24,18,0.18); }
  .btn-primary:hover { background: #dbb33b; }

  .btn-secondary { background: var(--bone-raised); color: var(--espresso); border: 1px solid var(--line-on-bone); }
  .btn-secondary:hover { background: var(--gold-soft); }

  .btn-danger { background: transparent; color: var(--danger); border: 1px solid var(--danger); }
  .btn-danger:hover { background: rgba(162,59,46,0.08); }

  .btn-icon {
    background: transparent;
    border: none;
    cursor: pointer;
    font-size: 20px;
    padding: 4px 8px;
    color: var(--muted-on-bone);
  }
  .btn-icon:focus-visible { outline: 2px solid var(--gold); outline-offset: 2px; }
  .btn-icon:disabled { opacity: 0.25; cursor: default; }

  select, input[type=text], input[type=number], textarea {
    font-family: var(--font-body);
    font-size: 14px;
    padding: 10px 12px;
    border: 1px solid var(--line-on-bone);
    border-radius: var(--radius-sm);
    background: var(--bone-raised);
    color: var(--espresso);
  }
  select:focus-visible, input:focus-visible, textarea:focus-visible {
    outline: 2px solid var(--gold);
    outline-offset: 1px;
  }

  .search-pill {
    display: flex;
    align-items: center;
    background: var(--bone-raised);
    border-radius: 999px;
    padding: 4px 6px;
    margin-bottom: 26px;
    box-shadow: 0 3px 14px rgba(0,0,0,0.15);
  }
  .search-pill:focus-within { box-shadow: 0 0 0 2px var(--gold), 0 3px 14px rgba(0,0,0,0.15); }
  .search-pill input[type=text] {
    border: none; background: transparent; flex: 1; padding: 10px 14px; border-radius: 999px;
  }
  .search-pill input[type=text]:focus-visible { outline: none; }
  .pill-divider { width: 1px; height: 24px; background: var(--line-on-bone); flex-shrink: 0; }
  .search-pill select {
    border: none; background: transparent; padding: 10px 14px; border-radius: 999px;
    font-size: 13px; color: var(--muted-on-bone);
  }
  .search-pill select:focus-visible { outline: none; }

  .recipe-grid {
    display: grid;
    gap: 22px;
    grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
  }

  .recipe-card {
    display: block;
    text-decoration: none;
    color: inherit;
    background: var(--bone);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: 0 6px 20px rgba(0,0,0,0.18);
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }
  .recipe-card:hover, .recipe-card:focus-visible {
    transform: translateY(-3px);
    box-shadow: 0 10px 26px rgba(0,0,0,0.24);
    outline: none;
  }
  .recipe-card:focus-visible { box-shadow: 0 0 0 2px var(--gold), 0 10px 26px rgba(0,0,0,0.24); }

  .card-photo { width: 100%; height: 150px; overflow: hidden; }
  .card-photo img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .card-photo-empty {
    background: repeating-linear-gradient(135deg, var(--gold-soft), var(--gold-soft) 10px, var(--bone) 10px, var(--bone) 20px);
    opacity: 0.6;
  }

  .card-body { padding: 16px 18px 18px; }
  .card-tag {
    font-family: var(--font-mono);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--rust);
  }
  .recipe-card h3 {
    font-family: var(--font-display);
    font-size: 20px;
    font-weight: 600;
    color: var(--espresso);
    margin: 6px 0 10px;
    line-height: 1.2;
  }
  .card-meta {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--muted-on-bone);
  }

  .empty-state { text-align: center; padding: 70px 20px; color: var(--muted-on-clay); }
  .empty-state .stamp {
    font-family: var(--font-display);
    font-size: 22px;
    color: var(--cream-text);
    margin-bottom: 8px;
  }

  .page-toolbar { margin-bottom: 16px; }
  .back-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 14px;
    font-weight: 600;
    color: var(--cream-text);
    text-decoration: none;
    background: none;
    border: none;
    cursor: pointer;
    padding: 6px 0;
  }
  .back-link:hover { color: var(--gold-soft); }
  .back-link:focus-visible { outline: 2px solid var(--gold); outline-offset: 2px; }

  .content-panel {
    background: var(--bone);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: 0 10px 34px rgba(0,0,0,0.22);
    margin-bottom: 20px;
  }
  .detail-body { padding: 24px 24px 28px; color: var(--espresso); }

  .panel-title {
    font-family: var(--font-display);
    font-size: 26px;
    font-weight: 600;
    color: var(--espresso);
    margin: 0 0 20px;
  }

  .detail-hero { position: relative; width: 100%; height: 280px; }
  .detail-hero img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .hero-scrim {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; justify-content: flex-end;
    padding: 20px 24px;
    background: linear-gradient(180deg, rgba(36,24,18,0) 40%, rgba(36,24,18,0.8) 100%);
  }
  .hero-tag {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--gold-soft);
    margin-bottom: 6px;
    display: block;
  }
  .hero-scrim h2 {
    font-family: var(--font-display);
    font-size: 32px;
    color: #FBF6EC;
    margin: 0;
    line-height: 1.15;
  }

  .detail-header-plain { padding: 24px 24px 0; }
  .detail-header-plain .hero-tag { color: var(--rust); }
  .detail-header-plain h2 {
    font-family: var(--font-display);
    font-size: 30px;
    color: var(--espresso);
    margin: 6px 0 0;
  }

  .detail-toprow {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 8px; flex-wrap: wrap; gap: 10px;
  }
  .detail-servings {
    font-family: var(--font-mono);
    font-size: 13px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--muted-on-bone);
  }
  .detail-actions { display: flex; gap: 8px; }

  .section-label {
    font-family: var(--font-display);
    font-size: 18px;
    font-weight: 600;
    color: var(--espresso);
    margin: 26px 0 12px;
    padding-bottom: 8px;
    border-bottom: 2px solid var(--gold);
    display: inline-block;
  }

  .ingredient-list { list-style: none; padding: 0; margin: 0; }
  .ingredient-list li {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px dashed var(--line-on-bone);
    font-size: 15px;
  }
  .ingredient-list .amt {
    font-family: var(--font-mono);
    color: var(--rust);
    font-weight: 600;
    flex-shrink: 0;
  }

  .steps-list { list-style: none; padding: 0; margin: 0; counter-reset: step; }
  .steps-list li {
    position: relative;
    padding: 0 0 18px 40px;
    font-size: 15px;
    counter-increment: step;
  }
  .steps-list li::before {
    content: counter(step);
    position: absolute; left: 0; top: -2px;
    width: 28px; height: 28px;
    border-radius: 50%;
    background: var(--gold);
    color: var(--espresso);
    font-family: var(--font-mono);
    font-weight: 700;
    font-size: 13px;
    display: flex; align-items: center; justify-content: center;
  }
  .steps-list li:last-child { padding-bottom: 0; }

  .form-field { margin-bottom: 16px; display: flex; flex-direction: column; gap: 6px; }
  .form-field label { font-size: 13px; font-weight: 600; color: var(--muted-on-bone); }
  .form-row { display: flex; gap: 12px; }
  .form-row .form-field { flex: 1; }

  .cuisine-row { display: flex; gap: 8px; align-items: center; }
  .cuisine-row select { flex: 1; }

  .ingredient-row {
    display: grid;
    grid-template-columns: 1fr 90px 90px 32px;
    gap: 8px;
    margin-bottom: 8px;
    align-items: center;
  }

  .add-ingredient-btn {
    background: none;
    border: 1px dashed var(--line-on-bone);
    border-radius: var(--radius-sm);
    padding: 8px;
    width: 100%;
    color: var(--muted-on-bone);
    font-size: 13px;
    cursor: pointer;
    margin-top: 4px;
  }
  .add-ingredient-btn:hover { border-color: var(--gold); color: var(--rust); }

  textarea { width: 100%; min-height: 140px; font-family: var(--font-body); resize: vertical; }

  .photo-upload {
    border: 1px dashed var(--line-on-bone);
    border-radius: var(--radius);
    padding: 16px;
    text-align: center;
    cursor: pointer;
    color: var(--muted-on-bone);
  }
  .photo-upload:hover { border-color: var(--gold); }
  .photo-upload img { max-width: 100%; max-height: 200px; border-radius: var(--radius-sm); }
  .photo-upload input[type=file] { display: none; }

  .form-actions {
    display: flex;
    gap: 10px;
    margin-top: 28px;
    padding-top: 20px;
    border-top: 1px solid var(--line-on-bone);
  }

  .step-row {
    display: grid;
    grid-template-columns: 28px 1fr 84px;
    gap: 8px;
    margin-bottom: 8px;
    align-items: start;
  }
  .step-number {
    font-family: var(--font-mono);
    font-weight: 600;
    color: var(--rust);
    padding-top: 10px;
    text-align: right;
  }
  .step-row textarea { min-height: 56px; font-size: 14px; }
  .step-controls { display: flex; flex-direction: column; gap: 2px; }
  .step-controls .btn-icon { font-size: 15px; padding: 2px 6px; line-height: 1.2; }

  @keyframes viewEnter {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .view-enter { animation: viewEnter 0.32s ease; }
  @media (prefers-reduced-motion: reduce) {
    .view-enter { animation: none; }
  }

  @media (max-width: 480px) {
    .app-header h1 { font-size: 32px; }
    .detail-hero { height: 220px; }
    .hero-scrim h2 { font-size: 26px; }
    .form-row { flex-direction: column; }
    .ingredient-row { grid-template-columns: 1fr 70px 70px 28px; }
    .step-row { grid-template-columns: 22px 1fr 60px; }
  }

  [hidden] { display: none !important; }
</style>
</head>
<body>

<div class="app">
  <div id="view-list"></div>
  <div id="view-detail" hidden></div>
  <div id="view-edit" hidden></div>
</div>

<!-- Supabase client library, loaded as a plain script tag (no build step —
     matches how the rest of this app is loaded). Exposes a global `supabase`
     object with .createClient(), used just below to make our one shared connection. -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  // ---- Fill these in from your Supabase project: Settings > API ----
  const SUPABASE_URL = 'https://giqilxztbdksygzgihzx.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_CtlF7JfMYWzzf7QtrK2dEg_9-aZDxI-';
  const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
</script>
<script>
/* =========================================================================
   REPOSITORY LAYER — now backed by Supabase instead of localStorage.
   The public shape (getAll/get/save/delete/getCuisines/addCuisine) is
   UNCHANGED from the mock version — that's the whole point of the
   repository pattern. What changed is that every method is now async
   (it waits on a network request), and there's a new uploadPhoto() method
   since photos now live in Supabase Storage, not as base64 blobs.
   ========================================================================= */
const RecipeRepository = {
  async getAll() {
    const { data, error } = await supabaseClient
      .from('recipes')
      .select('*')
      .order('created_at', { ascending: false });
    if (error) { console.error('getAll failed:', error); return []; }
    return data.map(rowToRecipe);
  },

  async get(id) {
    const { data, error } = await supabaseClient
      .from('recipes')
      .select('*')
      .eq('id', id)
      .maybeSingle();
    if (error || !data) return null;
    return rowToRecipe(data);
  },

  async save(recipe) {
    const row = {
      title: recipe.title,
      cuisine: recipe.cuisine || null,
      servings: recipe.servings ? parseInt(recipe.servings, 10) : null,
      ingredients: recipe.ingredients,
      steps: recipe.steps,
      photo_url: recipe.photo || null
    };

    if (recipe.id) {
      const { data, error } = await supabaseClient
        .from('recipes').update(row).eq('id', recipe.id).select().single();
      if (error) throw error;
      return rowToRecipe(data);
    } else {
      const { data, error } = await supabaseClient
        .from('recipes').insert(row).select().single();
      if (error) throw error;
      return rowToRecipe(data);
    }
  },

  async delete(id) {
    const { error } = await supabaseClient.from('recipes').delete().eq('id', id);
    if (error) throw error;
  },

  async getCuisines() {
    const { data, error } = await supabaseClient
      .from('cuisines').select('name').order('name');
    if (error) { console.error('getCuisines failed:', error); return []; }
    return data.map(row => row.name);
  },

  async addCuisine(name) {
    // upsert + ignoreDuplicates: name is the primary key, so this is a
    // no-op if the cuisine already exists instead of throwing a conflict
    // error — same "add if missing" behavior the old localStorage version had.
    const { error } = await supabaseClient
      .from('cuisines').upsert({ name }, { onConflict: 'name', ignoreDuplicates: true });
    if (error) throw error;
  },

  // Uploads a photo file to the 'recipe-photos' storage bucket and returns
  // its public URL. Called from handleSave, not from the form directly —
  // the file only needs to actually upload once you hit "Save recipe".
  async uploadPhoto(file) {
    const ext = file.name.split('.').pop();
    const path = `${crypto.randomUUID()}.${ext}`;
    const { error } = await supabaseClient.storage.from('recipe-photos').upload(path, file);
    if (error) throw error;
    const { data } = supabaseClient.storage.from('recipe-photos').getPublicUrl(path);
    return data.publicUrl;
  }
};

// Maps a database row (snake_case, as Postgres conventionally uses) to the
// shape the rest of the app already expects (camelCase `photo`, `createdAt`)
// — this is the one place that translation happens, so the three views
// never need to know the database's column names.
function rowToRecipe(row) {
  return {
    id: row.id,
    title: row.title,
    cuisine: row.cuisine,
    servings: row.servings,
    ingredients: row.ingredients || [],
    steps: row.steps || [],
    photo: row.photo_url,
    createdAt: row.created_at
  };
}

function navigateTo(path) {
  window.location.hash = path;
}

function parseHash() {
  const hash = window.location.hash.slice(1) || '/list';
  const parts = hash.split('/').filter(Boolean);
  if (parts[0] === 'recipe' && parts[1]) return { view: 'detail', id: parts[1] };
  if (parts[0] === 'edit') return { view: 'edit', id: parts[1] || null };
  return { view: 'list' };
}

async function render() {
  const route = parseHash();
  const listEl = document.getElementById('view-list');
  const detailEl = document.getElementById('view-detail');
  const editEl = document.getElementById('view-edit');

  listEl.hidden = route.view !== 'list';
  detailEl.hidden = route.view !== 'detail';
  editEl.hidden = route.view !== 'edit';

  if (route.view === 'list') await renderListView();
  if (route.view === 'detail') await renderDetailView(route.id);
  if (route.view === 'edit') await renderEditView(route.id);

  const active = route.view === 'list' ? listEl : (route.view === 'detail' ? detailEl : editEl);
  active.classList.remove('view-enter');
  void active.offsetWidth;
  active.classList.add('view-enter');
}

window.addEventListener('hashchange', render);
window.addEventListener('DOMContentLoaded', render);

// Registering this is what actually makes the app installable — a
// manifest alone isn't enough for Chrome/Android's install criteria.
// Feature-detected since older browsers don't support service workers at
// all, and wrapped in .catch so a registration failure (e.g. testing
// locally via file:// instead of a real server) doesn't break the app.
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch((err) => {
      console.error('Service worker registration failed:', err);
    });
  });
}

let listState = { search: '', cuisine: '' };

async function renderListView() {
  const container = document.getElementById('view-list');
  const cuisines = await RecipeRepository.getCuisines();

  container.innerHTML = `
    <div class="app-logo-wrap">
      <picture>
        <source srcset="logo.webp" type="image/webp">
        <img src="logo.png" alt="Family Restaurant logo">
      </picture>
    </div>
    <div class="app-header">
      <h1>Our Menu</h1>
      <p class="app-tagline">Recipes we always come back to</p>
      <button class="btn btn-primary" onclick="navigateTo('/edit')">+ New Recipe</button>
    </div>
    <div class="search-pill">
      <input type="text" placeholder="Search title or ingredient..."
        value="${escapeHtml(listState.search)}" id="search-input">
      <div class="pill-divider"></div>
      <select id="cuisine-filter">
        <option value="">All cuisines</option>
        ${cuisines.map(c => `<option value="${c}" ${listState.cuisine === c ? 'selected' : ''}>${c}</option>`).join('')}
      </select>
    </div>
    <div id="recipe-grid-container">
      <div class="empty-state"><div class="stamp">Loading…</div></div>
    </div>
  `;

  document.getElementById('search-input').addEventListener('input', e => {
    listState.search = e.target.value;
    updateRecipeGrid(); // only re-renders the grid, not this input
  });
  document.getElementById('cuisine-filter').addEventListener('change', e => {
    listState.cuisine = e.target.value;
    updateRecipeGrid();
  });

  await updateRecipeGrid();
}

async function updateRecipeGrid() {
  const recipes = await RecipeRepository.getAll();
  const filtered = recipes.filter(r => {
    const matchesSearch = !listState.search ||
      r.title.toLowerCase().includes(listState.search.toLowerCase()) ||
      r.ingredients.some(i => i.name.toLowerCase().includes(listState.search.toLowerCase()));
    const matchesCuisine = !listState.cuisine || r.cuisine === listState.cuisine;
    return matchesSearch && matchesCuisine;
  });

  document.getElementById('recipe-grid-container').innerHTML =
    filtered.length === 0
      ? renderEmptyState(recipes.length === 0)
      : `<div class="recipe-grid">${filtered.map(renderRecipeCard).join('')}</div>`;
}

function renderEmptyState(noneAtAll) {
  return `
    <div class="empty-state">
      <div class="stamp">${noneAtAll ? 'The menu is empty' : 'Nothing matches'}</div>
      <p>${noneAtAll ? 'Add the first recipe worth keeping.' : 'Try a different search or cuisine.'}</p>
    </div>
  `;
}

function renderRecipeCard(r) {
  return `
    <a class="recipe-card" href="#/recipe/${r.id}">
      ${r.photo
        ? `<div class="card-photo"><img src="${r.photo}" alt=""></div>`
        : `<div class="card-photo card-photo-empty"></div>`}
      <div class="card-body">
        <span class="card-tag">${escapeHtml(r.cuisine || 'Uncategorized')}</span>
        <h3>${escapeHtml(r.title)}</h3>
        <div class="card-meta">Serves ${r.servings || '—'}</div>
      </div>
    </a>
  `;
}

async function renderDetailView(id) {
  const container = document.getElementById('view-detail');
  container.innerHTML = `<div class="empty-state"><div class="stamp">Loading…</div></div>`;
  const r = await RecipeRepository.get(id);

  if (!r) {
    container.innerHTML = `
      <div class="page-toolbar"><button class="back-link" onclick="navigateTo('/list')">&larr; Back</button></div>
      <div class="content-panel"><div class="detail-body"><p>Recipe not found.</p></div></div>
    `;
    return;
  }

  container.innerHTML = `
    <div class="page-toolbar">
      <button class="back-link" onclick="navigateTo('/list')">&larr; Back to recipes</button>
    </div>
    <div class="content-panel">
      ${r.photo ? `
        <div class="detail-hero">
          <img src="${r.photo}" alt="${escapeHtml(r.title)}">
          <div class="hero-scrim">
            <span class="hero-tag">${escapeHtml(r.cuisine || 'Uncategorized')}</span>
            <h2>${escapeHtml(r.title)}</h2>
          </div>
        </div>
      ` : `
        <div class="detail-header-plain">
          <span class="hero-tag">${escapeHtml(r.cuisine || 'Uncategorized')}</span>
          <h2>${escapeHtml(r.title)}</h2>
        </div>
      `}
      <div class="detail-body">
        <div class="detail-toprow">
          <div class="detail-servings">Serves ${r.servings || '—'}</div>
          <div class="detail-actions">
            <button class="btn btn-secondary" onclick="navigateTo('/edit/${r.id}')">Edit</button>
            <button class="btn btn-danger" onclick="handleDelete('${r.id}')">Delete</button>
          </div>
        </div>

        <div class="section-label">Ingredients</div>
        <ul class="ingredient-list">
          ${r.ingredients.map(i => `
            <li><span>${escapeHtml(i.name)}</span><span class="amt">${i.amount || ''} ${i.unit || ''}</span></li>
          `).join('')}
        </ul>

        <div class="section-label">Steps</div>
        <ol class="steps-list">
          ${getStepsForDisplay(r).map(s => `<li>${escapeHtml(s)}</li>`).join('')}
        </ol>
      </div>
    </div>
  `;
}

async function handleDelete(id) {
  if (confirm("Delete this recipe? This can't be undone.")) {
    await RecipeRepository.delete(id);
    navigateTo('/list');
  }
}

let editState = { ingredients: [], photo: null };
// The original DB row being edited (or null for a new recipe) — set once
// per navigation into this view by renderEditView, then just read (never
// reset) by renderEditForm, so mid-edit refreshes (photo pick, add cuisine)
// don't wipe out whatever you've already typed.
let editingExisting = null;

async function renderEditView(id) {
  const container = document.getElementById('view-edit');
  container.innerHTML = `<div class="empty-state"><div class="stamp">Loading…</div></div>`;

  const existing = id ? await RecipeRepository.get(id) : null;
  editingExisting = existing;

  const existingSteps = existing
    ? (Array.isArray(existing.steps) ? existing.steps.slice()
        : (existing.instructions ? existing.instructions.split('\n').filter(s => s.trim()) : ['']))
    : [''];

  editState = existing
    ? { ...existing, ingredients: existing.ingredients.map(i => ({ ...i })), steps: existingSteps }
    : { title: '', cuisine: '', servings: '', ingredients: [{ name: '', amount: '', unit: '' }], steps: [''], photo: null };

  await renderEditForm();
}

// Redraws the form from whatever's CURRENTLY in editState, without
// re-fetching the recipe or resetting editState. This is what
// handlePhotoUpload and handleAddCuisine call — they've already updated
// editState directly, they just need the DOM to reflect it.
async function renderEditForm() {
  const container = document.getElementById('view-edit');
  const existing = editingExisting;
  const cuisines = await RecipeRepository.getCuisines();

  container.innerHTML = `
    <div class="page-toolbar">
      <button class="back-link" onclick="navigateTo('${existing ? '#/recipe/' + existing.id : '/list'}')">&larr; Cancel</button>
    </div>
    <div class="content-panel">
      <div class="detail-body">
        <h1 class="panel-title">${existing ? 'Edit recipe' : 'Add recipe'}</h1>

        <div class="form-field">
          <label for="f-title">Title</label>
          <input type="text" id="f-title" value="${escapeHtml(editState.title)}" placeholder="Green curry">
        </div>

        <div class="form-row">
          <div class="form-field">
            <label for="f-cuisine">Cuisine</label>
            <div class="cuisine-row">
              <select id="f-cuisine">
                <option value="">Select...</option>
                ${cuisines.map(c => `<option value="${c}" ${editState.cuisine === c ? 'selected' : ''}>${c}</option>`).join('')}
              </select>
              <button type="button" class="btn btn-secondary" onclick="handleAddCuisine()">+ New</button>
            </div>
          </div>
          <div class="form-field">
            <label for="f-servings">Servings</label>
            <input type="number" id="f-servings" min="1" value="${escapeHtml(String(editState.servings || ''))}" placeholder="4">
          </div>
        </div>

        <div class="form-field">
          <label>Photo</label>
          <div class="photo-upload" onclick="document.getElementById('f-photo').click()">
            ${(editState.photoPreviewUrl || editState.photo) ? `<img src="${editState.photoPreviewUrl || editState.photo}" alt="">` : '<span>Click to upload a photo</span>'}
            <input type="file" id="f-photo" accept="image/*">
          </div>
        </div>

        <div class="form-field">
          <label>Ingredients</label>
          <div id="ingredient-rows"></div>
          <button type="button" class="add-ingredient-btn" onclick="handleAddIngredientRow()">+ Add ingredient</button>
        </div>

        <div class="form-field">
          <label>Steps</label>
          <div id="step-rows"></div>
          <button type="button" class="add-ingredient-btn" onclick="handleAddStepRow()">+ Add step</button>
        </div>

        <div class="form-actions">
          <button class="btn btn-primary" onclick="handleSave('${existing ? existing.id : ''}')">Save recipe</button>
          <button class="btn btn-secondary" onclick="navigateTo('${existing ? '#/recipe/' + existing.id : '/list'}')">Cancel</button>
        </div>
      </div>
    </div>
  `;

  renderIngredientRows();
  renderStepRows();

  document.getElementById('f-photo').addEventListener('change', handlePhotoUpload);
}

function renderIngredientRows() {
  const el = document.getElementById('ingredient-rows');
  el.innerHTML = editState.ingredients.map((ing, idx) => `
    <div class="ingredient-row">
      <input type="text" placeholder="Ingredient" value="${escapeHtml(ing.name)}"
        oninput="editState.ingredients[${idx}].name = this.value">
      <input type="text" placeholder="Amount" value="${escapeHtml(String(ing.amount || ''))}"
        oninput="editState.ingredients[${idx}].amount = this.value">
      <input type="text" placeholder="Unit" value="${escapeHtml(ing.unit || '')}"
        oninput="editState.ingredients[${idx}].unit = this.value">
      <button type="button" class="btn-icon" onclick="handleRemoveIngredientRow(${idx})" aria-label="Remove ingredient">&times;</button>
    </div>
  `).join('');
}

function handleAddIngredientRow() {
  editState.ingredients.push({ name: '', amount: '', unit: '' });
  renderIngredientRows();
}
function handleRemoveIngredientRow(idx) {
  editState.ingredients.splice(idx, 1);
  renderIngredientRows();
}

function renderStepRows() {
  const el = document.getElementById('step-rows');
  el.innerHTML = editState.steps.map((step, idx) => `
    <div class="step-row">
      <span class="step-number">${idx + 1}.</span>
      <textarea placeholder="Describe this step..."
        oninput="editState.steps[${idx}] = this.value">${escapeHtml(step)}</textarea>
      <div class="step-controls">
        <button type="button" class="btn-icon" onclick="handleMoveStep(${idx}, -1)"
          aria-label="Move step up" ${idx === 0 ? 'disabled' : ''}>&uarr;</button>
        <button type="button" class="btn-icon" onclick="handleMoveStep(${idx}, 1)"
          aria-label="Move step down" ${idx === editState.steps.length - 1 ? 'disabled' : ''}>&darr;</button>
        <button type="button" class="btn-icon" onclick="handleRemoveStepRow(${idx})" aria-label="Remove step">&times;</button>
      </div>
    </div>
  `).join('');
}

function handleAddStepRow() {
  editState.steps.push('');
  renderStepRows();
}
function handleRemoveStepRow(idx) {
  editState.steps.splice(idx, 1);
  if (editState.steps.length === 0) editState.steps.push('');
  renderStepRows();
}
function handleMoveStep(idx, direction) {
  const newIdx = idx + direction;
  if (newIdx < 0 || newIdx >= editState.steps.length) return;
  const steps = editState.steps;
  [steps[idx], steps[newIdx]] = [steps[newIdx], steps[idx]];
  renderStepRows();
}

async function handleAddCuisine() {
  const name = prompt('New cuisine/category name:');
  if (!name || !name.trim()) return;
  try {
    await RecipeRepository.addCuisine(name.trim());
    await renderEditForm();
    document.getElementById('f-cuisine').value = name.trim();
  } catch (err) {
    console.error('Add cuisine failed:', err);
    alert("Couldn't add that cuisine — check your connection and try again.");
  }
}

async function handlePhotoUpload(e) {
  const file = e.target.files[0];
  if (!file) return;
  // Stash the raw file for upload at save time; URL.createObjectURL gives an
  // instant local preview without needing to read/encode the file yet —
  // much cheaper than the old FileReader-to-base64 approach, and we only
  // pay the real upload cost once, on Save, not on every re-render.
  editState.photoFile = file;
  editState.photoPreviewUrl = URL.createObjectURL(file);
  await renderEditForm();
}

async function handleSave(existingId) {
  const title = document.getElementById('f-title').value.trim();
  if (!title) { alert('Give the recipe a title.'); return; }

  // Unlike localStorage, this call can genuinely fail (dropped wifi, a
  // typo'd Supabase key, the free-tier project being paused) — so we
  // disable the button and give feedback instead of assuming success.
  const saveBtn = document.querySelector('#view-edit .btn-primary');
  saveBtn.disabled = true;
  saveBtn.textContent = 'Saving…';

  try {
    let photoUrl = editState.photo || null;
    if (editState.photoFile) {
      photoUrl = await RecipeRepository.uploadPhoto(editState.photoFile);
    }

    const recipe = {
      id: existingId || null,
      title,
      cuisine: document.getElementById('f-cuisine').value,
      servings: document.getElementById('f-servings').value,
      ingredients: editState.ingredients.filter(i => i.name.trim()),
      steps: editState.steps.map(s => s.trim()).filter(Boolean),
      photo: photoUrl
    };

    const saved = await RecipeRepository.save(recipe);
    navigateTo('/recipe/' + saved.id);
  } catch (err) {
    console.error('Save failed:', err);
    alert("Couldn't save the recipe — check your connection and try again.");
    saveBtn.disabled = false;
    saveBtn.textContent = 'Save recipe';
  }
}

function getStepsForDisplay(recipe) {
  if (Array.isArray(recipe.steps) && recipe.steps.length) return recipe.steps;
  if (recipe.instructions) return recipe.instructions.split('\n').filter(s => s.trim());
  return [];
}

function escapeHtml(str) {
  if (str === null || str === undefined) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}
</script>

</body>
</html>
